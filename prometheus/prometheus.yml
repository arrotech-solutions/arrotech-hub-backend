global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mini-hub-monitor'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'mini-hub-host'

  # Application metrics (disabled - endpoint not yet implemented)
  # Uncomment when /metrics endpoint is added to the app
  # - job_name: 'mini-hub-app'
  #   static_configs:
  #     - targets: ['app:8000']
  #       labels:
  #         instance: 'mini-hub-app'
  #   metrics_path: '/metrics'
  #   scrape_interval: 30s

  # PostgreSQL Exporter (optional - add if you want DB metrics)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis Exporter (optional - add if you want Redis metrics)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # Nginx metrics (if using nginx-prometheus-exporter)
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']

  # Docker container metrics (if using cAdvisor)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # Elasticsearch metrics
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
        labels:
          instance: 'elasticsearch'
    metrics_path: '/_prometheus/metrics'
    scrape_interval: 30s

