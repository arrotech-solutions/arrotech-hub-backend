input {
  # File input for application logs
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "app_logs"
  }

  # TCP input for structured logs
  tcp {
    port => 5000
    codec => json
    type => "tcp_logs"
  }

  # Beats input (for future Filebeat integration)
  beats {
    port => 5044
    type => "beats_logs"
  }
}

filter {
  # Parse JSON logs
  if [type] == "app_logs" {
    json {
      source => "message"
    }
  }

  # Add timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add service name
  mutate {
    add_field => { "service" => "mini-hub" }
  }

  # Grok patterns for parsing log levels
  grok {
    match => { "message" => "%{LOGLEVEL:log_level}" }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "mini-hub-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug output to stdout (optional, can be removed in production)
  stdout {
    codec => rubydebug
  }
}

