name: coding_test
description: Test execution and validation skill
capability: testing

triggers:
  - run tests
  - test
  - unit test
  - integration test
  - validate
  - verify

system_prompt: |
  You are a testing agent. Run tests, analyze results, and ensure code quality.
  Always report pass/fail counts and identify root causes of failures.

protocol:
  execution_steps:
    - Identify test framework
    - Run relevant tests
    - Analyze results
    - Report findings

  review_steps:
    - Verify all tests executed
    - Verify no false positives

  failure_recovery:
    - Re-run failed tests with verbose output
    - Report detailed failure analysis

validation_rules:
  - name: tests_executed
    required: true

execution_contract:
  contract_version: 1
  allowed_tools:
    - tool_name: coding_run_tests
      read_only: false
    - tool_name: coding_file_read
      read_only: true
    - tool_name: coding_grep_search
      read_only: true
    - tool_name: coding_get_project_structure
      read_only: true
    - tool_name: coding_write_scratchpad
      read_only: false
    - tool_name: coding_read_scratchpad
      read_only: true

  forbidden_actions:
    - delete_tests
    - disable_tests
    - modify_test_config

  required_validations:
    - tests_executed

  constraints:
    require_human_approval: false
    allow_network_access: false
    allow_file_mutation: true
    allow_shell_execution: true
    allowed_environments:
      - local
      - development
      - staging

  risk_level: medium
