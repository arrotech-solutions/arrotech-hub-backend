# Deploy to Fly.io
# https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ====================================
  # RUN TESTS BEFORE DEPLOY
  # ====================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-timeout

      - name: Run Tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-secret-key
          DATABASE_URL: sqlite:///./test.db
        run: |
          pytest tests/ -v --timeout=120 -p no:warnings

  # ====================================
  # DEPLOY TO FLY.IO
  # ====================================
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    concurrency: deploy-group

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run Database Migrations
        run: flyctl ssh console -C "cd /app && alembic upgrade head"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        continue-on-error: true

      - name: Health Check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -f https://arrotech-hub.onrender.com/health || echo "Health check endpoint not available"
        continue-on-error: true

  # ====================================
  # POST-DEPLOYMENT NOTIFICATION
  # ====================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to Fly.io successful!"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
