name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ====================================
  # BACKEND TESTS
  # ====================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx pytest-timeout flake8

      - name: Run Flake8 (Linter)
        run: flake8 tests/ --max-line-length=79 --exclude=__pycache__

      - name: Run Backend Tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-secret-key
          DATABASE_URL: sqlite:///./test.db
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing --timeout=120 -p no:warnings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # ====================================
  # FRONTEND TESTS
  # ====================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../Mini-Hub-frontend

    steps:
      - uses: actions/checkout@v4
        with:
          path: Mini-Hub

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Mini-Hub-frontend
          path: Mini-Hub-frontend
        continue-on-error: true

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -d "../Mini-Hub-frontend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        working-directory: Mini-Hub

      - name: Set up Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Mini-Hub-frontend/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm ci
        working-directory: Mini-Hub-frontend

      - name: Run Frontend Tests
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm test -- --watchAll=false --passWithNoTests
        working-directory: Mini-Hub-frontend
        env:
          CI: true

  # ====================================
  # CODE QUALITY
  # ====================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      - name: Run Black (Check Only)
        run: black --check src/ --line-length 79 || true

      - name: Run Flake8 on Source
        run: flake8 src/ --max-line-length=120 --exclude=__pycache__ || true

  # ====================================
  # SECURITY SCAN
  # ====================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

  # ====================================
  # BUILD CHECK
  # ====================================
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, code-quality]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mini-hub:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
