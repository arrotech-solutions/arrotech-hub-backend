# =============================================================================
# CI/CD Pipeline for Mini-Hub (Python Backend)
# =============================================================================
# Uses centralized reusable workflows from arrotech-solutions-actions
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Grant permissions required by reusable workflows
permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ===========================================================================
  # Stage 1: Code Quality & Security
  # ===========================================================================

  code-quality:
    name: Code Quality
    uses: arrotech-solutions/arrotech-solutions-actions/.github/workflows/ci-code-quality.yml@main
    with:
      language: "python"
      python-version: "3.11"
      fail-on-warnings: false

  security-scan:
    name: Security Scan
    uses: arrotech-solutions/arrotech-solutions-actions/.github/workflows/ci-security-scan.yml@main
    with:
      language: "python"
      enable-codeql: false        # Requires GitHub Advanced Security (paid)
      enable-dependency-scan: true
      enable-secret-scan: false   # Gitleaks requires license for orgs
      fail-on-high-severity: false

  # ===========================================================================
  # Stage 2: Testing
  # ===========================================================================

  test:
    name: Tests
    needs: [code-quality]
    uses: arrotech-solutions/arrotech-solutions-actions/.github/workflows/ci-test.yml@main
    with:
      language: "python"
      python-version: "3.11"
      coverage-threshold: 30  # TODO: Increase as tests are added
      upload-coverage: true
      parallel-tests: true

  # ===========================================================================
  # Stage 3: Deploy to Fly.io
  # ===========================================================================

  deploy-staging:
    name: Deploy to Staging
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    uses: arrotech-solutions/arrotech-solutions-actions/.github/workflows/cd-deploy.yml@main
    with:
      environment: "staging"
      platform: "flyio"
      flyio-app-name: "mini-hub"  # Existing Fly.io app
      flyio-region: "lhr"
      flyio-vm-size: "shared-cpu-1x"
      flyio-vm-memory: 256
      flyio-min-machines: 1
      flyio-max-machines: 2
      wait-for-rollout: true
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DEPLOY_ENV_VARS: ${{ secrets.STAGING_ENV_VARS }}

  deploy-production:
    name: Deploy to Production
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: arrotech-solutions/arrotech-solutions-actions/.github/workflows/cd-deploy.yml@main
    with:
      environment: "production"
      platform: "flyio"
      flyio-app-name: "mini-hub"  # Existing Fly.io app
      flyio-region: "lhr"
      flyio-vm-size: "shared-cpu-1x"
      flyio-vm-memory: 512
      flyio-min-machines: 2
      flyio-max-machines: 5
      flyio-ha: true
      wait-for-rollout: true
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DEPLOY_ENV_VARS: ${{ secrets.PRODUCTION_ENV_VARS }}

  # ===========================================================================
  # Post-Deployment Health Check
  # ===========================================================================

  health-check:
    name: Health Check
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Check staging health
        if: needs.deploy-staging.result == 'success'
        env:
          STAGING_URL: ${{ needs.deploy-staging.outputs.deployment-url }}
        run: |
          if [ -n "$STAGING_URL" ]; then
            echo "Checking health at $STAGING_URL/health"
            curl -f "$STAGING_URL/health" || echo "Health check endpoint not found or failed"
          fi

      - name: Check production health
        if: needs.deploy-production.result == 'success'
        env:
          PROD_URL: ${{ needs.deploy-production.outputs.deployment-url }}
        run: |
          if [ -n "$PROD_URL" ]; then
            echo "Checking health at $PROD_URL/health"
            curl -f "$PROD_URL/health" || echo "Health check endpoint not found or failed"
          fi

  # ===========================================================================
  # PR Checks
  # ===========================================================================

  pr-checks:
    name: PR Validation
    if: github.event_name == 'pull_request'
    uses: arrotech-solutions/arrotech-solutions-actions/.github/workflows/pr-checks.yml@main
    with:
      require-conventional-commits: true
      require-tests: true
