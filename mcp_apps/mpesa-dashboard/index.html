<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa Business Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #22c55e;
            --accent-hover: #16a34a;
            --border: #334155;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 24px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            height: 300px;
        }

        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #2d3748;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-completed { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .status-pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34, 197, 94, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="header">
        <h1>M-Pesa Business</h1>
        <button class="btn" onclick="refreshData()">Refresh</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Revenue (24h)</div>
            <div class="stat-value" id="total-revenue">KES 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Transactions</div>
            <div class="stat-value" id="tx-count">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending Reconciliations</div>
            <div class="stat-value" id="pending-count">0</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="revenueChart"></canvas>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Transaction ID</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tx-table-body">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>

    <script>
        // --- MCP App Bridge Implementation ---
        class MCPBridge {
            constructor() {
                this.pendingRequests = new Map();
                window.addEventListener('message', this.handleMessage.bind(this));
            }

            handleMessage(event) {
                const data = event.data;
                if (data.jsonrpc !== '2.0') return;

                if (data.id !== undefined && this.pendingRequests.has(data.id)) {
                    const { resolve, reject } = this.pendingRequests.get(data.id);
                    if (data.error) reject(data.error);
                    else resolve(data.result);
                    this.pendingRequests.delete(data.id);
                }
            }

            request(method, params = {}) {
                return new Promise((resolve, reject) => {
                    const id = Math.random().toString(36).substring(7);
                    this.pendingRequests.set(id, { resolve, reject });
                    
                    window.parent.postMessage({
                        jsonrpc: '2.0',
                        method,
                        params,
                        id
                    }, '*');
                });
            }

            callTool(name, arguments = {}) {
                return this.request('callTool', { name, arguments });
            }
        }

        const bridge = new MCPBridge();
        let chart = null;

        async function refreshData() {
            document.getElementById('loading').style.opacity = '1';
            document.getElementById('loading').style.pointerEvents = 'auto';

            try {
                // Call the M-Pesa tool through the host
                const result = await bridge.callTool('mpesa_payment_reconciliation', {
                    operation: 'get_summary',
                    days: 7
                });

                updateDashboard(result);
            } catch (error) {
                console.error('Failed to fetch data:', error);
                alert('Connection error. Please ensure the Hub is connected.');
            } finally {
                document.getElementById('loading').style.opacity = '0';
                document.getElementById('loading').style.pointerEvents = 'none';
            }
        }

        function updateDashboard(data) {
            // Summary Stats
            document.getElementById('total-revenue').innerText = `KES ${data.total_amount?.toLocaleString() || 0}`;
            document.getElementById('tx-count').innerText = data.transaction_count || 0;
            document.getElementById('pending-count').innerText = data.unmatched_count || 0;

            // Table
            const tbody = document.getElementById('tx-table-body');
            tbody.innerHTML = '';
            
            const transactions = data.recent_transactions || [];
            transactions.forEach(tx => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(tx.created_at).toLocaleDateString()}</td>
                    <td><code>${tx.transaction_id}</code></td>
                    <td>${tx.customer_name || 'Anonymous'}</td>
                    <td>KES ${tx.amount.toLocaleString()}</td>
                    <td><span class="status-badge status-${tx.status.toLowerCase()}">${tx.status}</span></td>
                `;
                tbody.appendChild(row);
            });

            // Chart
            updateChart(data.daily_trends || []);
        }

        function updateChart(trends) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trends.map(t => t.date),
                    datasets: [{
                        label: 'Revenue',
                        data: trends.map(t => t.amount),
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        // Initial load
        window.addEventListener('load', () => {
            // Simulate initial wait for bridge to settle
            setTimeout(refreshData, 500);
        });
    </script>
</body>
</html>
