<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Workspace Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .nav-item {
            padding: 12px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Views */
        .view {
            display: none;
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .view.active {
            display: block;
        }

        /* Gmail List */
        .email-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .email-item {
            background: var(--card-bg);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .email-item:hover {
            background: #2d3748;
        }

        .email-sender {
            width: 180px;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .email-subject {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .email-snippet {
            color: var(--text-secondary);
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-date {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .calendar-header {
            background: #2d3748;
            padding: 12px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .calendar-day {
            background: var(--card-bg);
            min-height: 120px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-number {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .calendar-event {
            background: rgba(79, 70, 229, 0.2);
            border-left: 2px solid var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Loading */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 16px;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="layers" size="20"></i>
            Workspace
        </div>
        <div class="nav-item active" onclick="switchTab('gmail')">
            <i data-lucide="mail" size="18"></i>
            Gmail
        </div>
        <div class="nav-item" onclick="switchTab('calendar')">
            <i data-lucide="calendar" size="18"></i>
            Calendar
        </div>
        <div class="nav-item" onclick="switchTab('drive')">
            <i data-lucide="database" size="18"></i>
            Drive
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2 id="view-title">Gmail</h2>
            <div class="actions">
                <button class="btn" onclick="refreshCurrentView()">
                    <i data-lucide="refresh-cw" size="16"></i>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Gmail View -->
        <div id="gmail-view" class="view active">
            <div class="email-list" id="email-list">
                <!-- Emails injected here -->
            </div>
        </div>

        <!-- Calendar View -->
        <div id="calendar-view" class="view">
            <div class="calendar-grid" id="calendar-grid">
                <!-- Calendar header and days injected here -->
            </div>
        </div>

        <!-- Drive View (Placeholder) -->
        <div id="drive-view" class="view">
            <div class="empty-state">
                <i data-lucide="database" size="48"></i>
                <p>Drive management coming soon</p>
            </div>
        </div>
    </div>

    <script>
        // --- MCP App Bridge ---
        class MCPBridge {
            constructor() {
                this.pendingRequests = new Map();
                window.addEventListener('message', this.handleMessage.bind(this));
            }

            handleMessage(event) {
                const data = event.data;
                if (data.jsonrpc !== '2.0') return;

                if (data.id !== undefined && this.pendingRequests.has(data.id)) {
                    const { resolve, reject } = this.pendingRequests.get(data.id);
                    if (data.error) reject(data.error);
                    else resolve(data.result);
                    this.pendingRequests.delete(data.id);
                }
            }

            request(method, params = {}) {
                return new Promise((resolve, reject) => {
                    const id = Math.random().toString(36).substring(7);
                    this.pendingRequests.set(id, { resolve, reject });
                    window.parent.postMessage({ jsonrpc: '2.0', method, params, id }, '*');
                });
            }

            callTool(name, arguments = {}) {
                return this.request('callTool', { name, arguments });
            }
        }

        const bridge = new MCPBridge();
        let currentTab = 'gmail';

        function switchTab(tab) {
            currentTab = tab;
            
            // Update UI
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}-view`).classList.add('active');
            
            document.getElementById('view-title').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
            
            refreshCurrentView();
        }

        async function refreshCurrentView() {
            setLoading(true);
            try {
                if (currentTab === 'gmail') await refreshGmail();
                else if (currentTab === 'calendar') await refreshCalendar();
            } catch (error) {
                console.error(`Failed to refresh ${currentTab}:`, error);
            } finally {
                setLoading(false);
            }
        }

        async function refreshGmail() {
            const result = await bridge.callTool('google_workspace_gmail', {
                operation: 'read_emails',
                max_results: 10
            });

            const list = document.getElementById('email-list');
            list.innerHTML = '';

            const emails = result.emails || [];
            if (emails.length === 0) {
                list.innerHTML = '<div class="email-item">No emails found</div>';
                return;
            }

            emails.forEach(email => {
                const item = document.createElement('div');
                item.className = 'email-item';
                item.innerHTML = `
                    <div class="email-sender">${email.from_name || email.from_email}</div>
                    <div class="email-content">
                        <div class="email-subject">${email.subject}</div>
                        <div class="email-snippet">${email.snippet || ''}</div>
                    </div>
                    <div class="email-date">${new Date(email.date).toLocaleDateString()}</div>
                `;
                list.appendChild(item);
            });
        }

        async function refreshCalendar() {
            const result = await bridge.callTool('google_workspace_calendar', {
                operation: 'list_events',
                max_results: 20
            });

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Add headers
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-header';
                header.innerText = day;
                grid.appendChild(header);
            });

            // Very simplified calendar view for the current week
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());

            const events = result.events || [];

            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(startOfWeek);
                dayDate.setDate(startOfWeek.getDate() + i);
                
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.innerHTML = `<div class="day-number">${dayDate.getDate()}</div>`;

                // Filter events for this day
                const dayEvents = events.filter(e => {
                    const eventDate = new Date(e.start);
                    return eventDate.toDateString() === dayDate.toDateString();
                });

                dayEvents.forEach(e => {
                    const eventEl = document.createElement('div');
                    eventEl.className = 'calendar-event';
                    eventEl.innerText = e.summary;
                    eventEl.title = `${e.summary} (${new Date(e.start).toLocaleTimeString()})`;
                    dayEl.appendChild(eventEl);
                });

                grid.appendChild(dayEl);
            }
        }

        function setLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'flex' : 'none';
        }

        // Initialize icons and load first view
        window.addEventListener('load', () => {
            lucide.createIcons();
            refreshCurrentView();
        });
    </script>
</body>
</html>
